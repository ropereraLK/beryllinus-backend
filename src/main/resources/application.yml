server:
  port: 9090

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    root: INFO
    org.springframework.cache: TRACE
    com.beryllinus.backend: TRACE
    org.springframework.data.redis: TRACE

spring:
  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  cache:
    type: redis

  data: # For development only
    redis:
      host: localhost
      port: 6379
      database: 0

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka Configs
  kafka:
    bootstrap-servers: ${KAFKA_URI}

    producer:
      acks: all
      retries: 3

      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    properties:
      enable.idempotence: true

      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-256

      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_USER}"
        password="${KAFKA_PWD}";

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches

  metrics:
    enable:
      cache: true

booking:
  maxSearchDaysAhead: 364
  maxStayLength: 30

cache:
  defaultTtl: 5m
  roomClassesTtl: 24h

kafka:
  topics:
    booking: booking-events
    payment: payment-events
    inventory: inventory-events