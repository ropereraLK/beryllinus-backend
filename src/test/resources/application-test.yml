spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true
  cache:
    type: none

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

booking:
  maxSearchDaysAhead: 364
  maxStayLength: 30

cache:
  defaultTtl: 5m
  roomClassesTtl: 24h

kafka:
  topics:
    booking: booking-events
    payment: payment-events
    inventory: inventory-events